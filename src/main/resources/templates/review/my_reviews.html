<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - 내가 작성한 리뷰</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #D4183D;
            --primary-light: #ff3a5c;
            --teal: #2ac1bc;
            --teal-light: rgba(42,193,188,0.12);
            --dark: #1a1a2e;
            --gray-bg: #f4f5f7;
            --card-shadow: 0 4px 20px rgba(0,0,0,0.07);
            --card-hover-shadow: 0 12px 40px rgba(0,0,0,0.13);
            --radius: 18px;
            --star: #FFBE00;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--gray-bg);
            color: #222;
            min-height: 100vh;
        }

        /* ===== GNB HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: 64px;
            border-bottom: 1px solid #eee;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 200;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .logo {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1.5px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .logo:hover { opacity: 0.8; }
        .nav-menu {
            display: flex;
            gap: 32px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-menu a {
            text-decoration: none;
            color: #333;
            font-weight: 700;
            font-size: 15px;
            position: relative;
            padding-bottom: 4px;
            transition: color 0.2s;
        }
        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background: var(--primary);
            transition: width 0.25s ease;
        }
        .nav-menu a:hover { color: var(--primary); }
        .nav-menu a:hover::after { width: 100%; }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .icon-btn {
            background: none;
            border: none;
            font-size: 19px;
            color: #444;
            cursor: pointer;
            position: relative;
            transition: color 0.2s, transform 0.2s;
        }
        .icon-btn:hover { color: var(--primary); transform: scale(1.1); }
        .badge {
            position: absolute;
            top: -7px; right: -9px;
            background: var(--primary);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 10px;
            line-height: 1.4;
        }

        /* ===== PAGE WRAPPER ===== */
        .page-wrapper {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 16px 80px;
        }

        /* ===== HERO HEADER ===== */
        .mypage-hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 60%, #16213e 100%);
            border-radius: var(--radius);
            padding: 36px 40px;
            margin-bottom: 36px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(26,26,46,0.25);
            animation: heroSlideIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        .mypage-hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 220px; height: 220px;
            background: radial-gradient(circle, rgba(212,24,61,0.25) 0%, transparent 70%);
            border-radius: 50%;
        }
        .mypage-hero::after {
            content: '';
            position: absolute;
            bottom: -40px; left: 30%;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(42,193,188,0.18) 0%, transparent 70%);
            border-radius: 50%;
        }
        .hero-avatar {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(212,24,61,0.4);
            animation: avatarPop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .hero-title {
            font-size: 1.9rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            margin: 0 0 6px;
        }
        .hero-subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.92rem;
            margin: 0;
        }
        .hero-stats {
            display: flex;
            gap: 28px;
            margin-top: 24px;
            z-index: 1;
            position: relative;
        }
        .stat-item { text-align: center; }
        .stat-num {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.15);
            align-self: stretch;
        }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            animation: fadeUp 0.5s 0.2s ease both;
        }
        .section-title {
            font-size: 1.15rem;
            font-weight: 900;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }
        .count-pill {
            background: var(--dark);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            line-height: 1.5;
        }

        /* ===== REVIEW CARD ===== */
        .review-card {
            background: #fff;
            border: none;
            border-radius: var(--radius);
            box-shadow: var(--card-shadow);
            margin-bottom: 18px;
            overflow: hidden;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            animation: cardFadeUp 0.5s ease both;
        }
        .review-card:hover {
            box-shadow: var(--card-hover-shadow);
            transform: translateY(-3px);
        }
        .review-card:nth-child(1) { animation-delay: 0.05s; }
        .review-card:nth-child(2) { animation-delay: 0.12s; }
        .review-card:nth-child(3) { animation-delay: 0.19s; }
        .review-card:nth-child(4) { animation-delay: 0.26s; }
        .review-card:nth-child(5) { animation-delay: 0.33s; }

        .card-accent-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--teal), #4eecea);
        }
        .card-body-inner { padding: 22px 24px; }

        .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .store-badge {
            background: var(--teal-light);
            color: var(--teal);
            font-weight: 700;
            font-size: 0.88rem;
            padding: 5px 14px;
            border-radius: 20px;
            letter-spacing: -0.3px;
        }
        .date-label {
            font-size: 0.8rem;
            color: #9ea3b0;
            font-weight: 500;
        }

        /* Star Rating */
        .star-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .stars { display: flex; gap: 2px; }
        .star-icon { color: #e0e0e0; font-size: 17px; transition: color 0.15s; }
        .star-icon.filled { color: var(--star); }
        .rating-label { font-size: 0.82rem; font-weight: 700; color: #9ea3b0; }

        /* Menu Tag */
        .menu-tag-wrap { margin-bottom: 14px; }
        .menu-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f4f5f7;
            color: #555;
            font-size: 0.84rem;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 8px;
        }
        .menu-tag-dot {
            width: 7px; height: 7px;
            background: var(--teal);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Review Text */
        .review-text-block {
            background: #fafbfc;
            border-left: 3px solid var(--teal);
            border-radius: 0 10px 10px 0;
            padding: 14px 18px;
            font-size: 0.93rem;
            line-height: 1.7;
            color: #333;
            margin-bottom: 16px;
        }

        /* Image Badge */
        .img-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #f4f5f7;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.82rem;
            color: #666;
            margin-bottom: 16px;
        }
        .img-badge i { color: var(--teal); }

        /* Card Actions */
        .card-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            padding-top: 14px;
            border-top: 1px solid #f0f0f0;
        }
        .btn-edit {
            display: inline-flex; align-items: center; gap: 5px;
            background: transparent;
            border: 1.5px solid #FFBE00;
            color: #b8860b;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 10px;
            text-decoration: none;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .btn-edit:hover {
            background: #FFBE00;
            color: #333;
            transform: scale(1.04);
        }
        .btn-delete {
            display: inline-flex; align-items: center; gap: 5px;
            background: transparent;
            border: 1.5px solid #ff4d6d;
            color: #c0384f;
            font-size: 0.82rem;
            font-weight: 700;
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.2s;
        }
        .btn-delete:hover {
            background: #ff4d6d;
            color: #fff;
            transform: scale(1.04);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            background: #fff;
            border-radius: var(--radius);
            padding: 60px 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: fadeUp 0.5s ease both;
        }
        .empty-icon-wrap {
            width: 80px; height: 80px;
            background: var(--gray-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .empty-icon-wrap i { font-size: 32px; color: #ccc; }
        .empty-title { font-size: 1rem; font-weight: 700; color: #555; margin-bottom: 6px; }
        .empty-sub { font-size: 0.85rem; color: #aaa; }

        /* ===== ANIMATIONS ===== */
        @keyframes heroSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes avatarPop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes cardFadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .mypage-hero { padding: 26px 22px; }
            .hero-title { font-size: 1.5rem; }
            .card-body-inner { padding: 16px 18px; }
        }
    </style>
</head>
<body>

<!-- GNB Header (Thymeleaf fragment) -->
<div th:replace="~{fragments/header :: gnbHeader}"></div>

<div class="page-wrapper">

    <!-- Hero Header -->
    <div class="mypage-hero">
        <div class="hero-avatar">
            <i class="fa-solid fa-user" style="color:#fff; font-size:22px;"></i>
        </div>
        <h1 class="hero-title">My Page</h1>
        <p class="hero-subtitle">내가 그동안 작성한 소중한 리뷰 내역을 확인하는 공간입니다.</p>
        <div class="hero-stats">
            <div class="stat-item">
                <div class="stat-num" th:text="${myReviewList.size()}">0</div>
                <div class="stat-label">작성한 리뷰</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <div class="stat-num">4.8</div>
                <div class="stat-label">평균 별점</div>
            </div>
        </div>
    </div>

    <!-- Section Header -->
    <div class="section-header">
        <i class="fa-solid fa-list-check" style="color:var(--teal); font-size:18px;"></i>
        <span class="section-title">나의 리뷰 내역</span>
        <span class="count-pill" th:text="${myReviewList.size()}">0</span>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(myReviewList)}" class="empty-state">
        <div class="empty-icon-wrap">
            <i class="fa-solid fa-comment-slash"></i>
        </div>
        <div class="empty-title">아직 작성한 리뷰가 없습니다</div>
        <div class="empty-sub">주문하신 맛있는 음식에 대한 첫 리뷰를 남겨보세요!</div>
    </div>

    <!-- Review Cards -->
    <div th:each="review, iterStat : ${myReviewList}" class="review-card">
        <div class="card-accent-bar"></div>
        <div class="card-body-inner">

            <!-- Top Row: Store Name + Date -->
            <div class="card-top-row">
                <span class="store-badge" th:text="${review.userIdName}">BBQ 치킨 대전점</span>
                <span class="date-label" th:text="${#temporals.format(review.createdData, 'yyyy.MM.dd HH:mm')}">2026.05.18 12:00</span>
            </div>

            <!-- Star Rating -->
            <div class="star-row">
                <div class="stars">
                    <i th:each="i : ${#numbers.sequence(1,5)}"
                       th:classappend="${i <= review.rating} ? 'filled' : ''"
                       class="fa-solid fa-star star-icon"></i>
                </div>
                <span class="rating-label" th:text="${review.rating} + '점'">5점</span>
            </div>

            <!-- Menu Tag -->
            <div class="menu-tag-wrap">
                <div class="menu-tag">
                    <span class="menu-tag-dot"></span>
                    <span th:text="${review.menuName}">황금올리브 치킨</span>
                </div>
            </div>

            <!-- Review Text -->
            <div class="review-text-block" th:text="${review.content}">
                맛있게 잘 먹었습니다.
            </div>

            <!-- Image Attachment -->
            <div th:if="${review.picture != null and review.picture != ''}" class="img-badge">
                <i class="fa-solid fa-image"></i>
                <span>첨부 이미지:</span>
                <strong th:text="${review.picture}">sample.png</strong>
            </div>

            <!-- Action Buttons -->
            <div class="card-actions">
                <a th:href="@{/review/update/{id}(id=${review.reviewId})}" class="btn-edit">
                    <i class="fa-solid fa-pen"></i> 수정
                </a>
                <form th:action="@{/review/delete/{id}(id=${review.reviewId})}" method="post"
                      onsubmit="return confirm('정말 이 리뷰를 삭제하시겠습니까?');" class="m-0">
                    <input type="hidden" name="storeId" value="0">
                    <button type="submit" class="btn-delete">
                        <i class="fa-solid fa-trash"></i> 삭제
                    </button>
                </form>
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Intersection Observer for scroll-triggered card animations
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = '1';
                entry.target.style.transform = 'translateY(0)';
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.review-card').forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(22px)';
        card.style.transition = `opacity 0.5s ${i * 0.08}s ease, transform 0.5s ${i * 0.08}s ease, box-shadow 0.3s, transform 0.3s`;
        observer.observe(card);
    });
</script>
</body>
</html>
