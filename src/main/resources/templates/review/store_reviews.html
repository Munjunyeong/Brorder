<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가게 리뷰 관리 - 팀플 테스트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6f7;
            color: #333333;
        }
        /* 피그마 공통 GNB CSS 클래스 주입 보존 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            border-bottom: 1px solid #E9ECEF;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 30px;
        }
        .logo { font-size: 28px; font-weight: 900; color: #D4183D; letter-spacing: -1px; text-decoration: none; }
        .nav-menu { display: flex; gap: 35px; list-style: none; }
        .nav-menu a { text-decoration: none; color: #333333; font-weight: 700; font-size: 16px; }
        .header-icons { display: flex; gap: 25px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 20px; color: #333333; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -8px; right: -8px; background: #D4183D; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 10px; }

        /* 기존 배달앱 리뷰 본문 카드 스타일 명세 유지 */
        .app-header {
            background-color: #2ac1bc;
            color: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 4px 12px rgba(42, 193, 188, 0.15);
        }
        .review-card { background: white; border: none; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 20px; }
        .write-card { background: white; border: none; border-radius: 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); position: sticky; top: 100px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #e2e8f0; padding: 10px 14px; }
        .btn-primary { background-color: #2ac1bc; border: none; border-radius: 8px; }
        .btn-primary:hover { background-color: #229a96 !important; }
        .user-badge { background-color: #f1f3f5; color: #495057; font-weight: 500; padding: 6px 12px; border-radius: 20px; }
        .menu-tag { background-color: rgba(42, 193, 188, 0.08); color: #2ac1bc; font-size: 0.85rem; padding: 4px 10px; border-radius: 6px; display: inline-block; }
        .review-text { background-color: #fafafa; border-left: 3px solid #2ac1bc; padding: 16px; border-radius: 0 8px 8px 0; font-size: 0.95rem; line-height: 1.6; }
        .star-rating { color: #ffca28; }
        .img-container { background-color: #f8f9fa; border-radius: 8px; padding: 8px 12px; display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: gnbHeader}"></div>

<div class="container">
    <div class="app-header d-flex align-items-center justify-content-between">
        <div>
            <h1 class="fw-bold m-0" style="font-size: 1.8rem; letter-spacing: -1px;">✨ 실시간 고객 리뷰 관리</h1>
            <p class="m-0 mt-2 opacity-75" style="font-size: 1rem;">현재 조회 중인 맛집 고유 번호(storeId): <span class="fw-bold text-decoration-underline" th:text="${currentStoreId}">1</span></p>
        </div>
        <div class="fs-1 d-none d-sm-block">🛵</div>
    </div>

    <div class="row">
        <div class="col-md-5 mb-4">
            <div class="card write-card p-4 shadow-sm">
                <h4 class="fw-bold mb-4 d-flex align-items-center text-dark">
                    <span class="me-2">✏️</span> 리뷰 작성하기
                </h4>
                <form th:action="@{/review/write}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="storeId" th:value="${currentStoreId}">

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">주문한 메뉴 번호 (테스트용)</label>
                        <input type="number" class="form-control" name="menuId" value="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">별점 선택</label>
                        <select class="form-select fw-medium text-dark" name="rating" required>
                            <option value="5">⭐⭐⭐⭐⭐ (5점)</option>
                            <option value="4">⭐⭐⭐⭐ (4점)</option>
                            <option value="3">⭐⭐⭐ (3점)</option>
                            <option value="2">⭐⭐ (2점)</option>
                            <option value="1">⭐ (1점)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">리뷰 내용</label>
                        <textarea class="form-control" name="content" rows="4" placeholder="음식의 맛, 양, 배달 상태를 솔직하게 적어주세요!" required></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-secondary">📸 리뷰 사진 첨부</label>
                        <input type="file" class="form-control" name="reviewImageFile" accept="image/*">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 shadow-sm fs-5">리뷰 등록 완료</button>
                </form>
            </div>
        </div>

        <div class="col-md-7">
            <h4 class="fw-bold mb-4 d-flex align-items-center text-dark">
                <span class="me-2">💬</span> 등록된 고객 리뷰
                <span class="badge bg-primary ms-2 fs-6 rounded-pill" th:text="${reviewList.size()}">0</span>
            </h4>

            <div th:if="${#lists.isEmpty(reviewList)}" class="alert alert-secondary text-center py-5 border-0 rounded-4 shadow-sm" style="background-color: white;">
                <div class="fs-1 mb-2">💡</div>
                <div class="text-muted fw-medium">아직 등록된 리뷰가 없습니다.</div>
                <div class="text-muted small mt-1">첫 번째 따끈따끈한 리뷰를 남겨보세요!</div>
            </div>

            <div th:each="review : ${reviewList}" class="card review-card">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="user-badge" th:text="${review.userIdName}">user01</span>
                        <small class="text-secondary fw-medium" th:text="${#temporals.format(review.createdData, 'yyyy-MM-dd HH:mm')}">2026-05-18 12:00</small>
                    </div>

                    <div class="mb-3 d-flex align-items-center">
                        <span class="star-rating fw-bold fs-5" th:text="${'★'.repeat(review.rating)}">★★★★★</span>
                        <span class="text-muted small fw-bold ms-2" th:text="${review.rating} + '점'">5점</span>
                    </div>

                    <div class="mb-3">
                        <div class="menu-tag">
                            📌 <span class="fw-bold" th:text="${review.menuName}">후라이드 치킨</span>
                        </div>
                    </div>

                    <p class="review-text m-0 mb-3 text-dark" th:text="${review.content}">정말 맛있게 잘 먹었습니다! 배달도 빠르네요.</p>

                    <div class="mb-3" th:if="${review.picture != null and review.picture != ''}">
                        <div class="img-container text-secondary">
                            <span>🖼️</span> <span>첨부 이미지:</span> <strong th:text="${review.picture}">sample.png</strong>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end align-items-center gap-2 pt-2 border-top border-light">
                        <a th:href="@{/review/update/{id}(id=${review.reviewId})}" class="btn btn-outline-warning btn-sm fw-medium px-3 rounded-3">리뷰 수정</a>

                        <form th:action="@{/review/delete/{id}(id=${review.reviewId})}" method="post" onsubmit="return confirm('정말 이 리뷰를 삭제하시겠습니까?');" class="m-0">
                            <input type="hidden" name="storeId" th:value="${currentStoreId}">
                            <button type="submit" class="btn btn-outline-danger btn-sm fw-medium px-3 rounded-3">리뷰 삭제</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
