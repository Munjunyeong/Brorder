<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 수정하기 - 배달 앱 감성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f5f6f7;
            color: #333333;
        }
        .update-container {
            max-width: 600px;
            margin-top: 60px;
            margin-bottom: 60px;
        }
        .app-header {
            background-color: #ffca28; /* 수정 화면은 경쾌하고 따뜻한 옐로우/오렌지 포인트 */
            color: #333333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(255, 202, 40, 0.15);
        }
        .update-card {
            background: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 12px 16px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #ffca28;
            box-shadow: 0 0 0 3px rgba(255, 202, 40, 0.15);
        }
        .btn-warning-custom {
            background-color: #ffca28;
            color: #333333;
            border: none;
            border-radius: 8px;
            font-weight: 700;
        }
        .btn-warning-custom:hover {
            background-color: #e5b523;
            color: #333333;
        }
        .btn-cancel {
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container update-container">

    <div class="app-header d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
            <span class="fs-3">✏️</span>
            <h2 class="fw-bold m-0" style="font-size: 1.4rem; letter-spacing: -0.5px;">나의 리뷰 수정하기</h2>
        </div>
        <span class="fs-4">🍔</span>
    </div>

    <div class="card update-card p-4">
        <form th:action="@{/review/update/{id}(id=${review.reviewId})}" method="post">
            <input type="hidden" name="storeId" th:value="${review.storeId}">

            <div class="mb-4">
                <label class="form-label fw-bold small text-secondary">만족도 별점 변경</label>
                <select class="form-select fw-medium text-dark" name="rating" required>
                    <option value="5" th:selected="${review.rating == 5}">⭐⭐⭐⭐⭐ (5점)</option>
                    <option value="4" th:selected="${review.rating == 4}">⭐⭐⭐⭐ (4점)</option>
                    <option value="3" th:selected="${review.rating == 3}">⭐⭐⭐ (3점)</option>
                    <option value="2" th:selected="${review.rating == 2}">⭐⭐ (2점)</option>
                    <option value="1" th:selected="${review.rating == 1}">⭐ (1점)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-secondary">리뷰 내용 수정</label>
                <textarea class="form-control" name="content" rows="6"
                          placeholder="작성하신 내용 중 수정하고 싶으신 부분을 자유롭게 변경해 주세요."
                          th:text="${review.content}" required></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-secondary">첨부 사진 파일명 (테스트용)</label>
                <input type="text" class="form-control text-muted" name="picture" th:value="${review.picture}">
            </div>

            <div class="row g-2 pt-2 border-top border-light">
                <div class="col-6">
                    <a th:href="@{/review/store/{id}(id=${review.storeId})}" class="btn btn-outline-secondary w-100 btn-cancel py-2.5">수정 취소</a>
                </div>
                <div class="col-6">
                    <button type="submit" class="btn btn-warning-custom w-100 py-2.5 shadow-sm">수정 완료하기</button>
                </div>
            </div>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
