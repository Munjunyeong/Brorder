<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<div>
		<div>
			<h3>회원가입</h3>
		</div>
		
		<div>
			<form method="post">

				<div>
					<div><label for="id">아이디:</label></div>
					<div><input id="id" name="id" type="text"></div>
				</div>
			
				<div>
					<div><label>비밀번호:</label></div>
					<div><input name="password" type="password"></div>
				</div>
				
				<div>
					<div><label>이름:</label></div>
					<div><input name="name" type="text"></div>
				</div>
				
				<div>
					<div><label>전화번호:</label></div>
					<div><input name="phone" type="text"></div>
				</div>
				
				<div>
					<div><label>역할:</label></div>
					<div>
						<select name="role">
							<option value="user">주문</option>
							<option value="owner">판매</option>
						</select>
					</div>
				</div>
				
				<div>
					<div><button>등록</button></div>
					<div><a href="list">취소</a></div>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
