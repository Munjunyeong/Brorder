<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="/js/register.js"></script>
</head>
<body>
	<div>
		<div>
			<h3>회원가입</h3>
		</div>
		
		<div>
			<form method="post" id="register_form">
				<div>
					<div><label>아이디:</label></div>
					<div><input name="id" type="text"></div>
					<div><button type="button" id="check_id">중복 확인</button></div>
				</div>
			
				<div>
					<div><label>비밀번호:</label></div>
					<div>
						<input name="password" type="password">
						<button type="button" class="view">*ㅅ*</button>
					</div>
				</div>
				
				<div>
					<div><label>비밀번호확인:</label></div>
					<div>
						<input name="check_password" type="password">
						<button type="button" class="view">*ㅅ*</button>
					</div>
				</div>
				
				<div>
					<div><label>닉네임:</label></div>
					<div><input name="nickname" type="text"></div>
				</div>
				
				<div>
					<div><label>이름:</label></div>
					<div><input name="name" type="text"></div>
				</div>
				
				<div>
					<div><label>전화번호:</label></div>
					<div><input name="phone" type="text"></div>
				</div>
				
				<div>
					<div><label>역할:</label></div>
					<div>
						<select name="role">
							<option value="user">주문</option>
							<option value="owner">판매</option>
						</select>
					</div>
				</div>
				
				<div>
					<div><button type="button" id="accuse" disabled>회원가입</button></div>
					<div><a href="/">취소</a></div>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
