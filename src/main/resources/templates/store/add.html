<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>가게 등록</title></head>
<body>
<h1>새로운 판매처 등록</h1>
<hr>
<form th:action="@{/store/add}" method="post">
    <label>가게 이름: <input type="text" name="name" required></label><br><br>
    <label>카테고리:
        <select name="category">
            <option value="치킨">치킨</option>
            <option value="한식">한식</option>
            <option value="중식">중식</option>
            <option value="일식">일식</option>
        </select>
    </label><br><br>
    <label>주소: <input type="text" name="address" required></label><br><br>
    <label>전화번호: <input type="text" name="phone"></label><br><br>
    <button type="submit">등록하기</button>
</form>
<a th:href="@{/store/list}">취소</a>
</body>
</html>
