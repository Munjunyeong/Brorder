<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>음식 주문 사이트 - 판매처 상세</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .detail-box { border: 2px solid #333; padding: 20px; border-radius: 8px; max-width: 500px; }
        .detail-img { width: 100%; max-height: 300px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; display: block; }
        .detail-img-placeholder { width: 100%; height: 200px; background-color: #eee; display: flex; align-items: center; justify-content: center; border-radius: 6px; margin-bottom: 15px; font-weight: bold; color: #999; letter-spacing: 2px; }
    </style>
</head>
<body>

<h1>판매처 상세 정보</h1>
<hr>

<div class="detail-box">
    <!-- 대표 이미지가 있을 때 상단에 표시 -->
    <img th:if="${store.titleImage != null and store.titleImage != ''}"
         th:src="@{/upload/{filename}(filename=${store.titleImage})}"
         class="detail-img"
         alt="가게 대표 이미지">
    <!-- 이미지가 없을 때 기존 글자 플레이스홀더 표시 -->
    <div th:if="${store.titleImage == null or store.titleImage == ''}" class="detail-img-placeholder">
        <span>BRORDER</span>
    </div>
    <h2 th:text="${store.name}">대박치킨</h2>
    <p><strong>카테고리:</strong> <span th:text="${store.category}">치킨</span></p>
    <p><strong>전화번호:</strong> <span th:text="${store.phone}">042-123-4567</span></p>
    <p><strong>가게위치:</strong> <span th:text="${store.address}">대전광역시 동구</span></p>
<!--    <p><strong>가게평점:</strong> <span th:text="${'★ ' + store.rating}">★ 5</span></p>-->
    <p><strong>등록일자:</strong> <span th:text="${#temporals.format(store.createdData, 'yyyy-MM-dd HH:mm')}">2026-05-19</span></p>
    <p><strong>현재상태:</strong> <span th:text="${store.status}">OPEN</span></p>
</div>

<br>
<!-- 목록으로 돌아가기 링크 -->
<a th:href="@{/store/list}">← 판매처 목록으로 돌아가기</a>
<br>
<div style="display: flex; gap: 10px;">
    <!-- 세션 권한 체크 디렉티브 적용 -->
    <div th:if="${session.users != null and (session.users.role == 'OWNER' or session.users.role == 'ADMIN')}" style="display: flex; gap: 10px;">
    <!-- 수정 화면 이동 -->
    <a th:href="@{/store/{id}/update(id=${store.storeId})}">정보 수정</a>

    <!-- 삭제 요청 처리 -->
    <form th:action="@{/store/{id}/delete(id=${store.storeId})}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');">
        <button type="submit" style="color: red;">가게 삭제</button>
    </form>
</div>
<hr>

</body>
</html>
