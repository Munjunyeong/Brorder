<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <title>음식 주문 사이트 - 판매처 목록</title>
    <style>
        body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; padding: 20px; background-color: #f5f5f5; }
        .filter-container { margin-bottom: 20px; }
        .filter-btn { padding: 8px 15px; margin-right: 5px; text-decoration: none; background: #eee; color: #333; border-radius: 3px; border: 1px solid #ccc; }
        .filter-btn.active { background: #333; color: #fff; font-weight: bold; }
        .store-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<h1>배달 가능한 판매처 목록</h1>
<a th:href="@{/store/add}">[신규 판매처 등록하기]</a>
<hr>

<!-- 카테고리 필터 버튼 영역 추가 -->
<div class="filter-container">
    <!-- 전체보기 버튼: category 파라미터 없이 요청 -->
    <a th:href="@{/store/list}" class="filter-btn" th:classappend="${selectedCategory == null} ? 'active'">전체보기</a>

    <!-- 각 카테고리별 버튼: 클릭 시 쿼리 스트링으로 카테고리 전달 -->
    <a th:href="@{/store/list(category='치킨')}" class="filter-btn" th:classappend="${selectedCategory == '치킨'} ? 'active'">치킨</a>
    <a th:href="@{/store/list(category='한식')}" class="filter-btn" th:classappend="${selectedCategory == '한식'} ? 'active'">한식</a>
    <a th:href="@{/store/list(category='중식')}" class="filter-btn" th:classappend="${selectedCategory == '중식'} ? 'active'">중식</a>
    <a th:href="@{/store/list(category='일식')}" class="filter-btn" th:classappend="${selectedCategory == '일식'} ? 'active'">일식</a>
    <a th:href="@{/store/list(category='양식')}" class="filter-btn" th:classappend="${selectedCategory == '양식'} ? 'active'">양식</a>
</div>

<!-- 검색창 영역 추가 -->
<div style="margin-bottom: 20px;">
    <form th:action="@{/store/list}" method="get">
        <!-- 현재 선택된 카테고리가 있다면 검색할 때도 유지되도록 hidden으로 전송 -->
        <input type="hidden" name="category" th:value="${selectedCategory}">

        <input type="text" name="searchKeyword" th:value="${searchKeyword}" placeholder="가게 이름을 입력하세요" style="padding: 6px; width: 250px;">
        <button type="submit" style="padding: 6px 12px;">검색</button>

        <!-- 검색 조건 초기화 버튼 (전체보기 역할) -->
        <a th:href="@{/store/list}" th:if="${searchKeyword != null and searchKeyword != ''}" style="margin-left: 10px; color: gray; text-decoration: none;">검색 취소</a>
    </form>
</div>

<!-- 컨트롤러에서 보낸 "stores" 리스트가 비어있을 때 -->
<div th:if="${#lists.isEmpty(stores)}">
    <p>등록된 판매처가 없습니다.</p>
</div>

<!-- 컨트롤러에서 보낸 "stores" 리스트 반복문 실행 -->
<div th:unless="${#lists.isEmpty(stores)}" th:each="store : ${stores}" class="store-card">
    <h3 th:text="${store.name}">가게 이름</h3>
    <p>카테고리: <span th:text="${store.category}">한식</span></p>
    <p>주소: <span th:text="${store.address}">가게 주소</span></p>
<!--    <p>별점: <span th:text="${'★ ' + store.rating}">★ 5</span></p>-->
    <p>상태:
        <!-- 조건문으로 영업 상태별 클래스 적용 -->
        <span th:text="${store.status}"
              th:class="${store.status == 'OPEN' ? 'status-open' : 'status-close'}">OPEN</span>
    </p>

    <!-- 상세페이지 이동 버튼 (restful 방식으로 id 전달) -->
    <a th:href="@{/store/{id}(id=${store.storeId})}">가게 보기</a>

</div>


</body>
</html>
