<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="commonHead">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAYAAABPYyMiAAAABmJLR0T///////8JWPfcAAAACXBIWXMAAABIAAAASABGyWs+AAAAF0lEQVRIx2NgGAWjYBSMglEwCkbBSAcACBAAAegPC3gAAAAASUVORK5CYII=">
    <style>
        :root {
            --primary-mint: #2AC1BC;
            --primary-red: #D4183D;
            --primary-gold: #FFCA28;
            --dark-charcoal: #222222;
            --light-gray: #F5F6F8;
            --border-color: #E9ECEF;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 28px rgba(0,0,0,0.10);
            --shadow-lg: 0 16px 44px rgba(0,0,0,0.14);
            --content-max: 1280px;
            --side-pad: 7%;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fff;
            color: var(--dark-charcoal);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ══ NOTICE STRIP ══ */
        .notice-strip { background: var(--primary-red); color: #fff; font-size: 12px; font-weight: 700; padding: 9px 0; overflow: hidden; }
        .marquee-track { display: flex; align-items: center; white-space: nowrap; animation: marqueeScroll 30s linear infinite; gap: 64px; }
        .marquee-track span { opacity: .75; }
        .marquee-track strong { opacity: 1; display: inline-flex; align-items: center; gap: 6px; }
        @keyframes marqueeScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* ══ HEADER ══ */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 var(--side-pad); height: 80px; background: rgba(255,255,255,0.98); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; transition: box-shadow .3s, height .3s, background .3s; max-width: 100%; }
        .header.scrolled { box-shadow: 0 4px 24px rgba(0,0,0,0.08); height: 68px; background: rgba(255,255,255,0.99); }
        .logo { font-size: 26px; font-weight: 900; color: var(--primary-red); letter-spacing: -1px; text-decoration: none; display: flex; align-items: center; gap: 5px; flex-shrink: 0; transition: opacity .2s; }
        .logo:hover { opacity: .82; }
        .logo-dot { width: 7px; height: 7px; background: var(--primary-mint); border-radius: 50%; display: inline-block; animation: dotBounce 1.8s ease-in-out infinite; }
        @keyframes dotBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .nav-menu { display: flex; gap: 32px; list-style: none; margin: 0 auto; padding: 0 40px; }
        .nav-menu a { text-decoration: none; color: #444; font-weight: 700; font-size: 14px; position: relative; padding-bottom: 4px; transition: color .2s; white-space: nowrap; }
        .nav-menu a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--primary-mint); border-radius: 2px; transition: width .25s ease; }
        .nav-menu a:hover { color: var(--primary-mint); }
        .nav-menu a:hover::after { width: 100%; }
        .header-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .icon-btn { background: none; border: none; font-size: 18px; color: #444; cursor: pointer; position: relative; transition: all .2s; padding: 8px; border-radius: 10px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: var(--primary-red); background: #fff0f3; transform: scale(1.1); }
        .i-badge { position: absolute; top: 2px; right: 2px; background: var(--primary-red); color: #fff; font-size: 9px; font-weight: 900; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
        .auth-btn-group { display: flex; gap: 10px; align-items: center; }
        .btn-auth { text-decoration: none; font-size: 13px; font-weight: 800; padding: 9px 20px; border-radius: 22px; transition: all .22s; white-space: nowrap; }
        .btn-auth-login { color: var(--dark-charcoal); border: 1.5px solid var(--border-color); background: #fff; }
        .btn-auth-login:hover { background: var(--light-gray); border-color: #ccc; }
        .btn-auth-register { color: #fff; background: var(--primary-mint); border: 1.5px solid var(--primary-mint); }
        .btn-auth-register:hover { background: #1fa09c; border-color: #1fa09c; box-shadow: 0 4px 14px rgba(42,193,188,0.3); transform: translateY(-1px); }

        /* ══ HERO ══ */
        .hero { background: linear-gradient(135deg, #0f0f1e 0%, #161628 55%, #0a1628 100%); padding: 0 var(--side-pad); display: grid; grid-template-columns: 1.1fr 1fr; min-height: 400px; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 15% 60%, rgba(42,193,188,.2) 0%, transparent 52%), radial-gradient(ellipse at 85% 25%, rgba(212,24,61,.15) 0%, transparent 48%); pointer-events: none; }
        .hero::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,.035) 1px, transparent 1px); background-size: 30px 30px; pointer-events: none; }
        .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 56px 0; position: relative; z-index: 1; }
        .hero-eyebrow { display: inline-flex; align-items: center; gap: 8px; background: rgba(42,193,188,.14); border: 1px solid rgba(42,193,188,.32); color: var(--primary-mint); padding: 7px 18px; border-radius: 30px; font-size: 12px; font-weight: 800; margin-bottom: 22px; width: fit-content; animation: fadeUp .7s ease both; letter-spacing: .3px; }
        .hero-eyebrow .live-dot { width: 7px; height: 7px; background: var(--primary-mint); border-radius: 50%; animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.2; } }
        .hero-title { font-size: 46px; font-weight: 900; line-height: 1.22; color: #fff; margin-bottom: 16px; animation: fadeUp .7s .1s ease both; letter-spacing: -1.5px; }
        .hero-title .accent { color: var(--primary-mint); }
        .hero-subtitle { font-size: 15px; color: rgba(255,255,255,.58); line-height: 1.75; margin-bottom: 36px; animation: fadeUp .7s .2s ease both; }
        .hero-search-bar { display: flex; align-items: center; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 36px rgba(0,0,0,.32); animation: fadeUp .7s .3s ease both; max-width: 520px; }
        .hero-search-bar input { flex: 1; border: none; outline: none; padding: 17px 22px; font-size: 14px; font-weight: 600; color: var(--dark-charcoal); font-family: 'Noto Sans KR', sans-serif; }
        .hero-search-bar input::placeholder { color: #bbb; }
        .hero-search-btn { background: var(--primary-red); color: #fff; border: none; padding: 17px 28px; font-weight: 800; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .2s; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; }
        .hero-search-btn:hover { background: #b01030; }
        .hero-chips { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; animation: fadeUp .7s .4s ease both; }
        .hero-chip { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.68); padding: 6px 15px; border-radius: 22px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .2s; text-decoration: none; display: inline-block; }
        .hero-chip:hover { background: rgba(42,193,188,.22); border-color: var(--primary-mint); color: var(--primary-mint); }
        .hero-right { display: flex; flex-direction: column; justify-content: center; gap: 14px; padding: 40px 0 40px 48px; position: relative; z-index: 1; }
        .hero-promo-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,.065); border: 1px solid rgba(255,255,255,.1); border-radius: 18px; padding: 18px 22px; backdrop-filter: blur(10px); transition: all .25s ease; cursor: pointer; text-decoration: none; }
        .hero-promo-card:hover { background: rgba(255,255,255,.13); transform: translateX(5px); border-color: rgba(255,255,255,.2); }
        .hpc-icon { width: 54px; height: 54px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; flex-shrink: 0; }
        .hpc-1 { background: linear-gradient(135deg,#D4183D,#8e0b26); }
        .hpc-2 { background: linear-gradient(135deg,#FFCA28,#d4920a); }
        .hpc-3 { background: linear-gradient(135deg,#2AC1BC,#15807d); }
        .hpc-body { flex: 1; }
        .hpc-label { font-size: 10px; font-weight: 800; color: rgba(255,255,255,.45); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .8px; }
        .hpc-title { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 3px; }
        .hpc-sub { font-size: 12px; color: rgba(255,255,255,.5); }
        .hpc-arrow { color: rgba(255,255,255,.3); font-size: 12px; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        /* ── CATEGORY TABS ── */
        .category-section { background: #fff; padding: 0 var(--side-pad); border-bottom: 1px solid var(--border-color); position: relative; }
        .category-scroll { display: flex; gap: 4px; overflow-x: auto; padding-top: 28px; scrollbar-width: none; max-width: var(--content-max); margin: 0 auto; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .cat-tab { display: flex; align-items: center; gap: 7px; padding: 10px 20px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; border: 1.5px solid transparent; border-bottom: none; text-decoration: none; color: #999; background: var(--light-gray); transition: all .2s; position: relative; top: 1px; }
        .cat-tab.active, .cat-tab:hover { background: #fff; color: var(--primary-red); border-color: var(--border-color); border-bottom-color: #fff; }
        .cat-tab i { font-size: 14px; }

        /* ══ LAYOUT STYLES ══ */
        .section-inner { max-width: var(--content-max); margin: 0 auto; }
        .quick-section { background: #fff; padding: 40px var(--side-pad) 36px; border-bottom: 2px solid var(--light-gray); }
        .quick-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
        .quick-item { display: flex; flex-direction: column; align-items: center; gap: 11px; padding: 20px 8px; border-radius: 16px; cursor: pointer; text-decoration: none; color: var(--dark-charcoal); transition: background .2s; }
        .quick-item:hover { background: var(--light-gray); }
        .q-icon { width: 62px; height: 62px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 23px; color: #fff; box-shadow: 0 5px 16px rgba(0,0,0,.14); transition: transform .35s cubic-bezier(.175,.885,.32,1.275), box-shadow .35s; }
        .quick-item:hover .q-icon { transform: translateY(-9px) scale(1.09); box-shadow: 0 14px 28px rgba(0,0,0,.17); }
        .q-1 { background: linear-gradient(135deg,#FF6B6B,#ee5a24); }
        .q-2 { background: linear-gradient(135deg,#ffd32a,#e0a800); }
        .q-3 { background: linear-gradient(135deg,#2AC1BC,#1a9490); }
        .q-4 { background: linear-gradient(135deg,#a29bfe,#6c5ce7); }
        .q-5 { background: linear-gradient(135deg,#fd79a8,#e84393); }
        .q-6 { background: linear-gradient(135deg,#55efc4,#00b894); }
        .q-7 { background: linear-gradient(135deg,#fdcb6e,#e17055); }
        .q-8 { background: linear-gradient(135deg,#74b9ff,#0984e3); }
        .quick-item span { font-size: 12px; font-weight: 800; text-align: center; }

        /* ══ DUAL BANNER & RESTAURANTS ══ */
        .dual-banner { padding: 32px var(--side-pad); background: var(--light-gray); }
        .dual-banner-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: var(--content-max); margin: 0 auto; }
        .banner-card { border-radius: 20px; padding: 32px 36px; display: flex; justify-content: space-between; align-items: center; overflow: hidden; position: relative; min-height: 140px; cursor: pointer; text-decoration: none; transition: transform .28s, box-shadow .28s; }
        .banner-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
        .bc-1 { background: linear-gradient(135deg,#D4183D 0%,#8e0b26 100%); }
        .bc-2 { background: linear-gradient(135deg,#2AC1BC 0%,#15807d 100%); }
        .banner-card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 82% 50%, rgba(255,255,255,.13) 0%, transparent 58%); }
        .bc-text { position: relative; z-index: 1; }
        .bc-tag { background: rgba(255,255,255,.2); color: rgba(255,255,255,.92); font-size: 11px; font-weight: 800; padding: 4px 13px; border-radius: 20px; display: inline-block; margin-bottom: 12px; letter-spacing: .5px; }
        .bc-text h3 { font-size: 21px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 7px; }
        .bc-text p { font-size: 13px; color: rgba(255,255,255,.72); }
        .bc-visual { font-size: 60px; position: relative; z-index: 1; opacity: .88; line-height: 1; filter: drop-shadow(0 4px 10px rgba(0,0,0,.22)); flex-shrink: 0; }
        .popular-section { padding: 52px var(--side-pad); background: #fff; }
        .section-head { display: flex; align-items: center; justify-content: space-between; max-width: var(--content-max); margin: 0 auto 28px; }
        .section-head h2 { font-size: 22px; font-weight: 900; display: flex; align-items: center; gap: 10px; letter-spacing: -.4px; }
        .section-head h2 i { color: var(--primary-red); }
        .see-all { font-size: 13px; font-weight: 700; color: #aaa; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: color .2s; }
        .see-all:hover { color: var(--primary-mint); }
        .restaurant-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: var(--content-max); margin: 0 auto; }
        .rest-card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); cursor: pointer; text-decoration: none; color: inherit; transition: transform .28s, box-shadow .28s; display: flex; flex-direction: column; }
        .rest-card:hover { transform: translateY(-7px); box-shadow: var(--shadow-md); }
        .rest-img-wrap { overflow: hidden; position: relative; height: 170px; }
        .rest-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .45s ease; }
        .rest-card:hover .rest-img-wrap img { transform: scale(1.07); }
        .rest-badge { position: absolute; top: 10px; left: 10px; background: var(--primary-red); color: #fff; font-size: 10px; font-weight: 900; padding: 3px 10px; border-radius: 5px; letter-spacing: .3px; }
        .rest-badge.new { background: var(--primary-mint); }
        .rest-badge.sale { background: var(--primary-gold); color: var(--dark-charcoal); }
        .rest-body { padding: 18px; flex: 1; }
        .rest-name { font-size: 15px; font-weight: 900; margin-bottom: 8px; }
        .rest-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
        .rest-tag { background: var(--light-gray); color: #777; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
        .rest-meta { display: flex; align-items: center; justify-content: space-between; }
        .rest-rating { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 800; }
        .rest-rating i { color: var(--primary-gold); font-size: 12px; }
        .rest-delivery { font-size: 12px; color: #aaa; font-weight: 600; }
        .rest-min-order { font-size: 11px; color: #bbb; font-weight: 600; margin-top: 7px; }

        /* ══ TIMESALE & CTA ══ */
        .timesale-section { padding: 52px var(--side-pad); background: var(--light-gray); }
        .timesale-header { display: flex; align-items: center; justify-content: space-between; max-width: var(--content-max); margin: 0 auto 28px; }
        .timesale-header h2 { font-size: 22px; font-weight: 900; display: flex; align-items: center; gap: 10px; letter-spacing: -.4px; }
        .ts-timer { display: flex; align-items: center; gap: 8px; background: var(--primary-red); color: #fff; padding: 9px 20px; border-radius: 30px; font-size: 14px; font-weight: 900; }
        .ts-timer i { animation: pulseFade 1s infinite alternate; }
        @keyframes pulseFade { from { opacity:.55; } to { opacity:1; transform:scale(1.1); } }
        .timesale-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; max-width: var(--content-max); margin: 0 auto; }
        .ts-card { background: #fff; border-radius: 18px; border: 1px solid var(--border-color); overflow: hidden; box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .28s, box-shadow .28s; position: relative; }
        .ts-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
        .ts-img-wrap { height: 148px; overflow: hidden; position: relative; }
        .ts-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .42s ease; }
        .ts-card:hover .ts-img-wrap img { transform: scale(1.08); }
        .ts-discount { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,.62), transparent); padding: 20px 10px 9px; display: flex; justify-content: flex-end; }
        .ts-pct { background: var(--primary-red); color: #fff; font-size: 13px; font-weight: 900; padding: 4px 11px; border-radius: 6px; }
        .ts-body { padding: 14px 15px; }
        .ts-name { font-size: 13px; font-weight: 800; margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ts-prices { display: flex; align-items: center; gap: 7px; }
        .ts-original { font-size: 11px; text-decoration: line-through; color: #bbb; }
        .ts-sale { font-size: 15px; font-weight: 900; color: var(--primary-red); }
        .ts-store { font-size: 11px; color: #aaa; margin-top: 5px; font-weight: 600; }
        .promo-band { background: linear-gradient(100deg, #0f0f1e, #161628 60%, #0a1628); padding: 44px var(--side-pad); position: relative; overflow: hidden; }
        .promo-band::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, rgba(42,193,188,.1) 0%, transparent 58%); }
        .promo-band-inner { max-width: var(--content-max); margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 22px; position: relative; z-index: 1; }
        .pb-item { background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.09); border-radius: 18px; padding: 24px 26px; display: flex; align-items: center; gap: 20px; transition: background .25s, transform .25s; cursor: default; }
        .pb-item:hover { background: rgba(255,255,255,.1); transform: translateY(-2px); }
        .pb-icon { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 21px; color: #fff; flex-shrink: 0; }
        .pbi-1 { background: linear-gradient(135deg,var(--primary-red),#8e0b26); }
        .pbi-2 { background: linear-gradient(135deg,var(--primary-gold),#c58e00); }
        .pbi-3 { background: linear-gradient(135deg,var(--primary-mint),#15807d); }
        .pb-text h4 { font-size: 15px; font-weight: 900; color: #fff; margin-bottom: 5px; }
        .pb-text p { font-size: 12px; color: rgba(255,255,255,.52); line-height: 1.55; }

        /* ══ REVIEW CTA & STORES ══ */
        .review-cta { padding: 60px var(--side-pad); background: #fff; }
        .review-cta-inner { max-width: var(--content-max); margin: 0 auto; background: linear-gradient(135deg,#D4183D 0%,#8e0b26 100%); border-radius: 26px; padding: 52px 60px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 52px; position: relative; overflow: hidden; }
        .review-cta-inner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at 0% 100%, rgba(255,255,255,.07) 0%, transparent 50%), radial-gradient(circle at 100% 0%, rgba(0,0,0,.15) 0%, transparent 50%); }
        .review-cta-inner::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg,transparent,transparent 42px,rgba(255,255,255,.022) 42px,rgba(255,255,255,.022) 84px); }
        .rct-text { position: relative; z-index: 1; }
        .rct-text h2 { font-size: 26px; font-weight: 900; color: #fff; margin-bottom: 12px; line-height: 1.35; letter-spacing: -.5px; }
        .rct-text p { font-size: 14px; color: rgba(255,255,255,.68); line-height: 1.75; }
        .rct-stats { display: flex; gap: 36px; position: relative; z-index: 1; border-left: 1px solid rgba(255,255,255,.15); border-right: 1px solid rgba(255,255,255,.15); padding: 0 44px; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 30px; font-weight: 900; color: #fff; display: block; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,.52); font-weight: 700; margin-top: 5px; display: block; }
        .rct-action { display: flex; flex-direction: column; gap: 12px; align-items: flex-end; position: relative; z-index: 1; }
        .rct-btn-main { background: #fff; color: var(--primary-red); padding: 14px 34px; border-radius: 30px; font-weight: 900; font-size: 14px; text-decoration: none; white-space: nowrap; display: inline-flex; align-items: center; gap: 9px; box-shadow: 0 6px 22px rgba(0,0,0,.22); transition: all .28s cubic-bezier(.175,.885,.32,1.275); }
        .rct-btn-main:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 14px 30px rgba(0,0,0,.3); }
        .rct-btn-sub { background: rgba(255,255,255,.12); color: rgba(255,255,255,.82); padding: 11px 26px; border-radius: 30px; text-decoration: none; white-space: nowrap; border: 1px solid rgba(255,255,255,.22); display: inline-flex; align-items: center; gap: 8px; transition: background .2s, color .2s; }
        .rct-btn-sub:hover { background: rgba(255,255,255,.22); color: #fff; }
        .store-section { padding: 52px var(--side-pad); background: var(--light-gray); }
        .store-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; max-width: var(--content-max); margin: 0 auto; }
