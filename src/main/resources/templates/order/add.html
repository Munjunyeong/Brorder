<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주문 등록</title>
</head>
<body>

<h1>주문 등록</h1>

<form method="post" action="/orders">

    <div>
        <label>유저 번호</label>
        <input type="number"
               name="userId"
               required>
    </div>

    <div>
        <label>가게 번호</label>
        <input type="number"
               name="storeId"
               required>
    </div>

    <div>
        <label>결제 방식</label>
        <input type="text"
               name="paymentMethod"
               required>
    </div>

    <div>
        <label>요청사항</label>
        <input type="text"
               name="requests">
    </div>

    <hr>

    <h2>주문 메뉴</h2>

    <div id="menu-area">

        <div>
            <label>메뉴 번호</label>
            <input type="number"
                   name="items[0].menuId"
                   required>
        </div>

        <div>
            <label>옵션 번호</label>
            <input type="number"
                   name="items[0].optionId"
                   required>
        </div>

        <div>
            <label>가격</label>
            <input type="number"
                   name="items[0].price"
                   required>
        </div>

        <hr>

    </div>

    <button type="button" id="add-menu-btn">
        메뉴 추가
    </button>

    <button type="submit">
        주문하기
    </button>

</form>

<script>

    let index = 1;

    const addButton =
        document.getElementById("add-menu-btn");

    addButton.addEventListener("click", function () {

        const menuArea =
            document.getElementById("menu-area");

        const html = `
            <div>
                <label>메뉴 번호</label>
                <input type="number"
                       name="items[${index}].menuId"
                       required>
            </div>

            <div>
                <label>옵션 번호</label>
                <input type="number"
                       name="items[${index}].optionId"
                       required>
            </div>

            <div>
                <label>가격</label>
                <input type="number"
                       name="items[${index}].price"
                       required>
            </div>

            <hr>
        `;

        menuArea.insertAdjacentHTML(
            "beforeend",
            html
        );

        index++;
    });

</script>

</body>
</html>
