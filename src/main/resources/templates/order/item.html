<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{fragments/head :: commonHead}"></th:block>
    <title>주문 상세 - BRORDER</title>
    <style>
        .order-detail-section { padding: 60px var(--side-pad); background: var(--light-gray); min-height: calc(100vh - 80px - 300px); }
        .detail-card { background: #fff; border-radius: 26px; overflow: hidden; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); max-width: 800px; margin: 0 auto; }
        .detail-header { background: linear-gradient(135deg, var(--primary-red), #8e0b26); color: #fff; padding: 40px; text-align: center; }
        .detail-header h1 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        .detail-header p { opacity: 0.8; font-size: 14px; font-weight: 600; }
        .detail-body { padding: 40px; }
        .info-group { margin-bottom: 32px; }
        .info-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--dark-charcoal); }
        .info-title i { color: var(--primary-red); }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .info-box { background: var(--light-gray); padding: 16px 20px; border-radius: 15px; }
        .info-label { display: block; font-size: 11px; color: #aaa; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .info-value { display: block; font-size: 16px; font-weight: 800; color: var(--dark-charcoal); }
        .menu-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .menu-table th { text-align: left; font-size: 12px; color: #aaa; padding: 12px 0; border-bottom: 2px solid var(--light-gray); }
        .menu-table td { padding: 18px 0; border-bottom: 1px solid var(--light-gray); font-size: 14px; font-weight: 700; }
        .menu-price { text-align: right; color: var(--primary-mint); font-weight: 900; }
        .total-price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid var(--dark-charcoal); }
        .total-label { font-size: 18px; font-weight: 900; }
        .total-value { font-size: 24px; font-weight: 900; color: var(--primary-red); }
        .detail-actions { display: flex; gap: 12px; margin-top: 40px; }
        .btn-detail { flex: 1; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 15px; text-decoration: none; text-align: center; transition: all .2s; cursor: pointer; border: none; }
        .btn-list { background: var(--light-gray); color: var(--dark-charcoal); }
        .btn-list:hover { background: #e9ecef; }
        .btn-delete { background: #fff; color: var(--primary-red); border: 1.5px solid var(--primary-red); }
        .btn-delete:hover { background: #fff0f3; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/header :: gnbHeader}"></th:block>

<section class="order-detail-section">
    <div class="section-inner">
        <div class="detail-card reveal-scale">
            <div class="detail-header">
                <p>ORDER DETAILS</p>
                <h1>주문 상세 내역</h1>
                <p th:text="'주문번호: #' + ${order.orderId}"></p>
            </div>

            <div class="detail-body">
                <div class="info-group">
                    <h3 class="info-title"><i class="fa-solid fa-circle-info"></i> 기본 정보</h3>
                    <div class="info-row">
                        <div class="info-box">
                            <span class="info-label">유저 ID</span>
                            <span class="info-value" th:text="${order.userId}"></span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">가게 ID</span>
                            <span class="info-value" th:text="${order.storeId}"></span>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="info-box">
                            <span class="info-label">결제방식</span>
                            <span class="info-value" th:text="${order.paymentMethod}"></span>
                        </div>
                        <div class="info-box">
                            <span class="info-label">요청사항</span>
                            <span class="info-value" th:text="${order.requests != null && !order.requests.empty ? order.requests : '없음'}"></span>
                        </div>
                    </div>
                </div>

                <div class="info-group">
                    <h3 class="info-title"><i class="fa-solid fa-utensils"></i> 주문 메뉴</h3>
                    <table class="menu-table">
                        <thead>
                            <tr>
                                <th>메뉴 정보</th>
                                <th style="text-align: right;">가격</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item : ${order.items}">
                                <td>
                                    <div style="font-weight: 900; font-size: 15px;" th:text="'메뉴 #' + ${item.menuId}"></div>
                                    <div style="font-size: 12px; color: #aaa; font-weight: 600;" th:text="'옵션 #' + ${item.optionId}"></div>
                                </td>
                                <td class="menu-price" th:text="${#numbers.formatInteger(item.price, 3, 'COMMA') + '원'}"></td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="total-price-row">
                        <span class="total-label">최종 결제 금액</span>
                        <span class="total-value" th:text="${#numbers.formatInteger(order.totalPrice, 3, 'COMMA') + '원'}"></span>
                    </div>
                </div>

                <div class="detail-actions">
                    <a href="/orders" class="btn-detail btn-list"><i class="fa-solid fa-list"></i> 목록으로</a>
                    <a th:href="@{/orders/delete/{id}(id=${order.orderId})}" class="btn-detail btn-delete" 
                       onclick="return confirm('정말 삭제하시겠습니까?');"><i class="fa-solid fa-trash-can"></i> 주문 삭제</a>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block th:replace="~{fragments/footer :: defaultFooter}"></th:block>

<script>
    /* Scroll Reveal */
    const revealEls = document.querySelectorAll('.reveal-scale');
    const revealObs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
                revealObs.unobserve(e.target);
            }
        });
    }, { threshold: 0.1 });
    revealEls.forEach(el => revealObs.observe(el));
</script>
</body>
</html>
